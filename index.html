<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>go4cas — One human · Two worlds</title>
    <meta name="description" content="go4cas — product owner and builder by day; sports, outdoors, tattoos and tinkerer off the clock. One human, two worlds." />
    <meta name="theme-color" content="#08080a" />

    <link rel="icon" href="assets/favicon/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/favicon-180.png" />
    <link rel="manifest" href="site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg-base: #08080a;
        --brand-red: oklch(0.52 0.17 27);
        --brand-red-arrow: oklch(0.55 0.17 27);
        --text-hi: #f2f2f4;
        --text-hi-2: #e8e8ec;
        --text-hi-3: #e8e8ea;
        --text-mid: #b6b6bd;
        --text-low: #9a9aa2;
        --text-low-2: #84848d;
        --text-low-3: #6f6f78;
        --text-low-4: #6b6b73;
        --eyebrow-cool: oklch(0.78 0.07 235);
        --eyebrow-warm: oklch(0.8 0.09 72);
        --hairline: rgba(255, 255, 255, 0.14);
        --hairline-16: rgba(255, 255, 255, 0.16);
        --hairline-hover: rgba(255, 255, 255, 0.4);
        --surface: rgba(255, 255, 255, 0.02);
        --surface-hover: rgba(255, 255, 255, 0.06);
        --ease-ui: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-cross: cubic-bezier(0.65, 0, 0.35, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        background: var(--bg-base);
        overflow: hidden;
      }

      body {
        color: var(--text-hi);
        font-family: 'Space Grotesk', sans-serif;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        border: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        white-space: nowrap;
      }

      /* ----- Entrance keyframes ----- */
      @keyframes go4-fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes go4-drawY {
        from {
          transform: scaleY(0);
        }
        to {
          transform: scaleY(1);
        }
      }

      /* ----- Stage ----- */
      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
        background: radial-gradient(120% 120% at 50% 40%, #101013 0%, #08080a 60%, #050506 100%);
        /* pointer-parallax inputs, updated by JS (range ~ -0.5..0.5) */
        --mx: 0;
        --my: 0;
      }

      /* ----- Panels (half-portraits) ----- */
      .panel {
        position: absolute;
        top: 0;
        bottom: 0;
        width: clamp(240px, 31vw, 540px);
        overflow: hidden;
        /* The cross-and-fuse gesture: a plain CSS transition replaces the prototype's RAF loop. */
        transition: transform 1.05s var(--ease-cross);
      }
      .panel--left {
        left: 0;
      }
      .panel--right {
        right: 0;
      }

      .stage.assembled .panel--left {
        transform: translateX(50vw);
        z-index: 8;
      }
      .stage.assembled .panel--right {
        transform: translateX(-50vw);
        z-index: 9;
      }

      .img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition:
          transform 0.7s var(--ease-ui),
          filter 0.6s ease;
        --s: 1.06;
      }
      .img--left {
        object-position: 0% center;
        filter: contrast(1.06) saturate(1.05) brightness(0.98);
        transform: scale(var(--s)) translate(calc(var(--mx) * 12px), calc(var(--my) * 12px));
      }
      .img--right {
        object-position: 100% center;
        filter: contrast(1.04) saturate(1.05);
        transform: scale(var(--s)) translate(calc(var(--mx) * -12px), calc(var(--my) * -12px));
      }

      /* Panel hover — only when NOT assembled (pure CSS, fine pointers only) */
      @media (hover: hover) and (pointer: fine) {
        .stage:not(.assembled) .panel--left:hover .img--left {
          --s: 1.12;
          filter: contrast(1.1) saturate(1.12) brightness(1.06);
        }
        .stage:not(.assembled) .panel--right:hover .img--right {
          --s: 1.12;
          filter: contrast(1.06) saturate(1.12) brightness(1.06);
        }
        .stage:not(.assembled):has(.panel--left:hover) .panel--right .veil {
          opacity: 0.55;
        }
        .stage:not(.assembled):has(.panel--right:hover) .panel--left .veil {
          opacity: 0.55;
        }
      }

      .scrim {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(0deg, rgba(8, 8, 10, 0.82) 0%, rgba(8, 8, 10, 0) 40%);
      }
      .scrim--left {
        box-shadow: inset -28px 0 36px -26px rgba(0, 0, 0, 0.7);
      }
      .scrim--right {
        box-shadow: inset 28px 0 36px -26px rgba(0, 0, 0, 0.7);
      }

      .veil {
        position: absolute;
        inset: 0;
        background: var(--bg-base);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s ease;
      }

      /* Panel captions + descriptors */
      .caption {
        position: absolute;
        bottom: clamp(128px, 19vh, 168px);
        max-width: 17ch;
        animation: go4-fadeUp 1s var(--ease-ui) both var(--d, 0s);
      }
      .caption--left {
        left: clamp(20px, 2.4vw, 40px);
      }
      .caption--right {
        right: clamp(20px, 2.4vw, 40px);
        text-align: right;
      }

      .eyebrow {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .eyebrow--cool {
        color: var(--eyebrow-cool);
      }
      .eyebrow--warm {
        color: var(--eyebrow-warm);
      }

      .headline {
        font-size: clamp(26px, 3vw, 40px);
        font-weight: 600;
        line-height: 1;
        color: var(--text-hi);
        letter-spacing: -0.02em;
        white-space: nowrap;
      }

      .descriptor {
        position: absolute;
        bottom: clamp(30px, 7vh, 70px);
        max-width: 19ch;
        font-size: clamp(13px, 1.05vw, 15px);
        font-weight: 300;
        line-height: 1.5;
        color: var(--text-mid);
        animation: go4-fadeUp 1s var(--ease-ui) both var(--d, 0s);
      }
      .descriptor--left {
        left: clamp(20px, 2.4vw, 40px);
      }
      .descriptor--right {
        right: clamp(20px, 2.4vw, 40px);
        text-align: right;
      }

      /* ----- Center column ----- */
      .center {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: clamp(280px, 36vw, 460px);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        z-index: 5;
      }

      .divider {
        height: clamp(40px, 12vh, 120px);
        width: 1px;
        transform-origin: top;
        animation: go4-drawY 1s var(--ease-ui) both var(--d, 0s);
      }
      .divider--top {
        background: linear-gradient(#08080a, rgba(255, 255, 255, 0.16));
      }
      .divider--bottom {
        background: linear-gradient(rgba(255, 255, 255, 0.16), #08080a);
        margin-top: 32px;
      }

      .site-label {
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: var(--text-low-3);
        text-transform: uppercase;
        margin: 22px 0 18px;
        animation: go4-fadeUp 0.9s ease both var(--d, 0s);
      }

      .lockup {
        font-family: 'Audiowide', sans-serif;
        font-size: clamp(38px, 6.2vw, 78px);
        line-height: 1;
        letter-spacing: 0.01em;
        font-weight: 400;
        animation: go4-fadeUp 1s var(--ease-ui) both var(--d, 0s);
      }
      .lockup span {
        display: inline-block;
        transition: transform 0.3s var(--ease-ui);
      }
      .lockup__go {
        color: var(--text-hi-2);
      }
      .lockup__4 {
        color: var(--text-low-4);
      }
      .lockup__cas {
        color: var(--brand-red);
      }
      @media (hover: hover) and (pointer: fine) {
        .lockup span:hover {
          transform: translateY(-5px);
        }
      }

      .tagline {
        font-family: 'Space Mono', monospace;
        font-size: clamp(10px, 0.95vw, 12px);
        letter-spacing: 0.42em;
        color: var(--text-low-2);
        text-transform: uppercase;
        margin-top: 22px;
        animation: go4-fadeUp 1s ease both var(--d, 0s);
      }

      .cta-wrap {
        margin-top: 36px;
        animation: go4-fadeUp 1s ease both var(--d, 0s);
      }
      .cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        color: var(--text-hi-3);
        text-decoration: none;
        padding: 13px 26px;
        border: 1px solid var(--hairline);
        border-radius: 100px;
        background: var(--surface);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        transition:
          border-color 0.35s ease,
          background 0.35s ease,
          transform 0.35s var(--ease-ui);
      }
      @media (hover: hover) and (pointer: fine) {
        .cta:hover {
          border-color: var(--hairline-hover);
          background: var(--surface-hover);
          transform: translateY(-2px);
        }
      }
      .cta__arrow {
        font-family: 'Space Mono', monospace;
        color: var(--brand-red-arrow);
      }

      .socials {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 26px;
        animation: go4-fadeUp 1s ease both var(--d, 0s);
      }
      .social {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--text-low);
        background: var(--surface);
        transition:
          color 0.3s ease,
          border-color 0.3s ease,
          transform 0.3s var(--ease-ui);
      }
      @media (hover: hover) and (pointer: fine) {
        .social:hover {
          color: var(--text-hi);
          border-color: var(--hairline-hover);
          transform: translateY(-2px);
        }
      }

      /* ----- Focus visibility (keyboard) ----- */
      .cta:focus-visible,
      .social:focus-visible {
        outline: 2px solid var(--text-hi);
        outline-offset: 3px;
      }

      /* ----- Mobile / portrait: declutter the panels, prioritise the lockup ----- */
      @media (max-width: 700px) {
        .panel {
          width: 30vw;
        }
        /* Panel text crowds the center lockup on narrow screens; the center column
         carries the messaging there. Hidden from AT too to avoid duplicate reading. */
        .caption,
        .descriptor {
          display: none;
        }
        .center {
          width: min(88vw, 360px);
        }
      }

      /* ----- Reduced motion: no entrance animation, no slide, no parallax drift ----- */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-delay: 0ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <p id="fuse-status" class="visually-hidden" role="status" aria-live="polite"></p>

      <!-- LEFT — PROFESSIONAL (at rest); crosses to the right half of the fused face -->
      <div class="panel panel--left">
        <img class="img img--left" src="assets/img/me-professional.avif" srcset="assets/img/me-professional-400.avif 400w, assets/img/me-professional-600.avif 600w, assets/img/me-professional.avif 1000w" sizes="(max-width: 900px) 50vw, 31vw" width="1000" height="1500" decoding="async" alt="Professional half-portrait of go4cas" />
        <div class="scrim scrim--left" aria-hidden="true"></div>
        <div class="veil" aria-hidden="true"></div>
        <div class="caption caption--left" style="--d: 0.55s">
          <p class="eyebrow eyebrow--cool">Professional</p>
          <h2 class="headline">The Machine</h2>
        </div>
        <p class="descriptor descriptor--left" style="--d: 0.6s">Product owner and builder — turning hard problems into solutions that quietly ship.</p>
      </div>

      <!-- RIGHT — PERSONAL (at rest); crosses to the left half of the fused face -->
      <div class="panel panel--right">
        <img class="img img--right" src="assets/img/me-personal.avif" srcset="assets/img/me-personal-400.avif 400w, assets/img/me-personal-600.avif 600w, assets/img/me-personal.avif 1000w" sizes="(max-width: 900px) 50vw, 31vw" width="1000" height="1500" decoding="async" alt="Personal half-portrait of go4cas" />
        <div class="scrim scrim--right" aria-hidden="true"></div>
        <div class="veil" aria-hidden="true"></div>
        <div class="caption caption--right" style="--d: 0.7s">
          <p class="eyebrow eyebrow--warm">Personal</p>
          <h2 class="headline">The Man</h2>
        </div>
        <p class="descriptor descriptor--right" style="--d: 0.75s">Sports, outdoors, tattoos and tinkerer behind the pixels.</p>
      </div>

      <!-- CENTER -->
      <div class="center">
        <div class="divider divider--top" style="--d: 0.25s" aria-hidden="true"></div>

        <p class="site-label" style="--d: 0.35s">go4cas.com</p>

        <h1 class="lockup" style="--d: 0.45s" aria-label="go4cas"><span class="lockup__go">go</span><span class="lockup__4">4</span><span class="lockup__cas">cas</span></h1>

        <p class="tagline" style="--d: 0.6s">One&nbsp;human&nbsp;&nbsp;·&nbsp;&nbsp;Two&nbsp;worlds</p>

        <div class="cta-wrap" style="--d: 0.75s">
          <a class="cta" id="cta" href="mailto:hello@go4cas.com">enter my universe <span class="cta__arrow" aria-hidden="true">&rarr;</span></a>
        </div>

        <nav class="socials" style="--d: 0.85s" aria-label="Social links">
          <a class="social" href="https://github.com/go4cas" target="_blank" rel="noopener" aria-label="GitHub — go4cas">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.04-.02-2.05-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.33-1.76-1.33-1.76-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.96 0-1.32.47-2.39 1.24-3.23-.13-.31-.54-1.53.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.05.14 3 .4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.87.12 3.18.78.84 1.24 1.91 1.24 3.23 0 4.63-2.81 5.65-5.49 5.95.43.37.81 1.1.81 2.22 0 1.61-.01 2.9-.01 3.29 0 .32.21.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"
              />
            </svg>
          </a>
          <a class="social" href="https://x.com/go4cas" target="_blank" rel="noopener" aria-label="X — @go4cas">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z" /></svg>
          </a>
          <a class="social" href="https://instagram.com/go4cas" target="_blank" rel="noopener" aria-label="Instagram — @go4cas">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="2" width="20" height="20" rx="5" />
              <circle cx="12" cy="12" r="4" />
              <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
            </svg>
          </a>
        </nav>

        <div class="divider divider--bottom" style="--d: 0.9s" aria-hidden="true"></div>
      </div>
    </main>

    <script>
      ;(function () {
        var stage = document.querySelector('.stage')
        var cta = document.getElementById('cta')
        var status = document.getElementById('fuse-status')
        var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)')
        var finePointer = window.matchMedia('(hover: hover) and (pointer: fine)')

        // B. Pointer parallax — drift the two portraits in opposing directions.
        // Skipped for touch/coarse pointers and when reduced motion is requested.
        if (finePointer.matches && !reduceMotion.matches) {
          stage.addEventListener('pointermove', function (e) {
            var r = stage.getBoundingClientRect()
            stage.style.setProperty('--mx', (e.clientX - r.left) / r.width - 0.5)
            stage.style.setProperty('--my', (e.clientY - r.top) / r.height - 0.5)
          })
          stage.addEventListener('pointerleave', function () {
            stage.style.setProperty('--mx', 0)
            stage.style.setProperty('--my', 0)
          })
        }

        // D. The CTA gesture — toggle the cross-and-fuse. The mailto href is the
        // no-JS fallback; here we intercept it and drive the CSS transition instead.
        cta.addEventListener('click', function (e) {
          e.preventDefault()
          var assembled = stage.classList.toggle('assembled')
          status.textContent = assembled ? 'The two portrait halves have merged into one face.' : 'The portrait has split back into two halves.'
        })
      })()
    </script>
  </body>
</html>
