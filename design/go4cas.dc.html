<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  rootRef = React.createRef();
  panelLeftRef = React.createRef();
  panelRightRef = React.createRef();
  leftImgRef = React.createRef();
  rightImgRef = React.createRef();
  leftVeilRef = React.createRef();
  rightVeilRef = React.createRef();
  ctaRef = React.createRef();
  centerRef = React.createRef();
  contactRef = React.createRef();
  backRef = React.createRef();

  componentDidMount() {
    const root = this.rootRef.current;
    if (!root) return;
    const li = this.leftImgRef.current, ri = this.rightImgRef.current;
    const lv = this.leftVeilRef.current, rv = this.rightVeilRef.current;
    const pl = this.panelLeftRef.current, pr = this.panelRightRef.current;
    let mx = 0, my = 0;
    this.hovered = null;

    const apply = () => {
      const ls = this.hovered === 'left' ? 1.12 : 1.06;
      const rs = this.hovered === 'right' ? 1.12 : 1.06;
      if (li) li.style.transform = `scale(${ls}) translate(${mx * 12}px, ${my * 12}px)`;
      if (ri) ri.style.transform = `scale(${rs}) translate(${mx * -12}px, ${my * -12}px)`;
    };

    root.addEventListener('mousemove', (e) => {
      const r = root.getBoundingClientRect();
      mx = (e.clientX - r.left) / r.width - 0.5;
      my = (e.clientY - r.top) / r.height - 0.5;
      apply();
    });
    root.addEventListener('mouseleave', () => { mx = 0; my = 0; apply(); });

    if (pl) {
      pl.addEventListener('mouseenter', () => {
        if (this.assembled) return;
        this.hovered = 'left';
        if (li) li.style.filter = 'contrast(1.1) saturate(1.12) brightness(1.06)';
        if (rv) rv.style.opacity = '0.55';
        if (lv) lv.style.opacity = '0';
        apply();
      });
      pl.addEventListener('mouseleave', () => {
        this.hovered = null;
        if (li) li.style.filter = 'contrast(1.06) saturate(1.05) brightness(.98)';
        if (rv) rv.style.opacity = '0';
        apply();
      });
    }
    if (pr) {
      pr.addEventListener('mouseenter', () => {
        if (this.assembled) return;
        this.hovered = 'right';
        if (ri) ri.style.filter = 'contrast(1.06) saturate(1.12) brightness(1.06)';
        if (lv) lv.style.opacity = '0.55';
        if (rv) rv.style.opacity = '0';
        apply();
      });
      pr.addEventListener('mouseleave', () => {
        this.hovered = null;
        if (ri) ri.style.filter = 'contrast(1.04) saturate(1.05)';
        if (lv) lv.style.opacity = '0';
        apply();
      });
    }

    // ---- "Get in touch" → swap the two panels (toggle, wired via onClick) ----
    this.assembled = false;
  }

  _swap(on) {
    if (this.assembled === on) return;
    this.assembled = on;
    const pl = this.panelLeftRef.current;
    const pr = this.panelRightRef.current;
    if (!pl || !pr) return;
    const cross = window.innerWidth / 2;
    const easeT = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
    const move = (el, toPx, dur) => {
      el.style.animation = 'none';
      el.style.transition = 'none';
      try { el.getAnimations().forEach((a) => a.cancel()); } catch (e) {}
      if (el._raf) cancelAnimationFrame(el._raf);
      clearTimeout(el._mt);
      let fromPx = 0;
      try { fromPx = new DOMMatrixReadOnly(getComputedStyle(el).transform).m41; } catch (e) {}
      const start = performance.now();
      const step = (now) => {
        const t = Math.min(1, (now - start) / (dur || 1050));
        el.style.transform = 'translateX(' + (fromPx + (toPx - fromPx) * easeT(t)) + 'px)';
        if (t < 1) el._raf = requestAnimationFrame(step);
      };
      el._raf = requestAnimationFrame(step);
      el._mt = setTimeout(() => { if (el._raf) cancelAnimationFrame(el._raf); el.style.transform = 'translateX(' + toPx + 'px)'; }, (dur || 1050) + 150);
    };
    if (pl) pl.style.zIndex = on ? '8' : '';
    if (pr) pr.style.zIndex = on ? '9' : '';
    move(pl, on ? cross : 0, 1050);
    move(pr, on ? -cross : 0, 1050);
  }

  renderVals() {
    return {
      rootRef: this.rootRef,
      panelLeftRef: this.panelLeftRef,
      panelRightRef: this.panelRightRef,
      leftImgRef: this.leftImgRef,
      rightImgRef: this.rightImgRef,
      leftVeilRef: this.leftVeilRef,
      rightVeilRef: this.rightVeilRef,
      onCtaClick: (e) => { e.preventDefault(); this._swap(!this.assembled); },
      onBackClick: (e) => { e.preventDefault(); this._swap(false); },
      contactEmail: 'hello' + '@' + 'go4cas.com',
      contactHref: 'mailto:' + 'hello' + '@' + 'go4cas.com',
      ctaRef: this.ctaRef,
      centerRef: this.centerRef,
      contactRef: this.contactRef,
      backRef: this.backRef,
    };
  }
}
</script>
